apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-monitoring-app
  labels:
    app: aks-monitoring-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aks-monitoring-app
  template:
    metadata:
      labels:
        app: aks-monitoring-app
    spec:
      containers:
        - name: aks-monitoring-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: aks-monitoring-app-svc
spec:
  type: LoadBalancer
  selector:
    app: aks-monitoring-app
  ports:
    - port: 80
      targetPort: 8080